<!doctype html>
<html lang="tok">
  <head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>QA TP Dominant</title></head>
  <body>
    <h1>QA: TP Dominant</h1>
    <div id="content" data-sitelen-layer-scope>
      <p>toki pona li pona tawa mi. jan pona mi li toki e toki pona lon tenpo ale.</p>
      <p>mi moku e kili li pana e telo tawa jan suli en jan lili.</p>
      <p>ilo sona li pona tawa pali mi. mi wile sona e nasin pona.</p>
    </div>
    <pre id="diag"></pre>
    <script type="module">
      import { createSitelenLayerPlugin } from '../../src/index.ts';
      const diag = document.querySelector('#diag');
      const plugin = createSitelenLayerPlugin({
        container: '#content',
        debug: true,
        debugOverlay: true,
        onDiagnostics: (d) => (diag.textContent = JSON.stringify(d, null, 2))
      });
      plugin.init();
      window.qaPlugin = plugin;
    </script>
  </body>
</html>
